# ── CD: Deploy to VM ───────────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-push  # CI ke baad hi chalega

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/Event-driven-data-processing-pipeline-v2

            # Latest code pull karo
            git pull origin main

            # Containers restart karo
            docker-compose down
            docker-compose up -d --build

            # Health check
            sleep 10
            docker ps
            echo "Deployment successful!"
