name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker-compose build

      - name: Run containers
        run: docker-compose up -d

      - name: API Health Check
        run: |
          sleep 10
          curl http://localhost:8000/docs

